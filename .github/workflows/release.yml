name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build native targets on each runner ─────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86-64 (musl = fully static, works everywhere)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            binary: d-code
          # Linux arm64 (musl static)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            binary: d-code
          # macOS x86-64 (cross-compiled from arm64 runner)
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: d-code
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: d-code
          # Windows x86-64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: d-code.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Install musl tools (Linux x86)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: Configure cross-compile linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-musl]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p d-code
        env:
          # Needed for musl static linking
          RUSTFLAGS: ${{ contains(matrix.target, 'musl') && '-C target-feature=+crt-static' || '' }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          ARCHIVE="d-code-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v")
          $bin = "target\${{ matrix.target }}\release\${{ matrix.binary }}"
          $archive = "d-code-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: d-code-${{ matrix.target }}
          path: |
            d-code-${{ matrix.target }}.*
          if-no-files-found: error

  # ── Create GitHub Release and publish npm ─────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Publish to npm ────────────────────────────────────────────────────────
  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update npm package version
        working-directory: npm
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.RELEASE_VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
